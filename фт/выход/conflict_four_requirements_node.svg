<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Схема показывает зону рядом с загрузочной, холодильником и посудомоечной, где сходятся четыре разных требования: завоз сырья, хранение скоропортящихся продуктов, мойка грязной посуды и проход персонала к зоне отдыха.</desc>
